version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # Base de datos compartida para Keycloak
  postgres_iam:
    image: postgres:15
    container_name: postgres_iam
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network

  # Identidad y Gestión de Accesos (IDM)
  keycloak:
    # Usamos la imagen que construirás en MS_Keycloak
    image: gpaulucci/ms_keycloak:latest
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: ${DB_JDBC_URL}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      # Mapeo: Carpeta local -> Carpeta dentro del contenedor
      - ./keycloak-themes:/opt/keycloak/themes:ro
    depends_on:
      - postgres_iam
    networks:
      - app-network

  # API Restful en NestJS
  ms_api:
    image: gpaulucci/ms_api:latest
    container_name: ms_api
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/db
      # Es vital configurar las variables de entorno usando ConfigModule [cite: 160, 163]
    ports:
      - "3000:3000"
    networks:
      - app-network

  # Frontend en React
  ms_frontend:
    image: gpaulucci/ms_frontend:latest
    container_name: ms_frontend
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

services:
  # 1. Base de datos para Keycloak
  postgres_iam:
    image: postgres:15
    container_name: postgres_iam
    platform: linux/amd64
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app-network

  # 2. Keycloak con imagen personalizada
  keycloak:
    image: gpaulucci/ms_keycloak:latest
    container_name: keycloak
    platform: linux/amd64
    environment:
      KC_DB: postgres
      KC_DB_URL: ${DB_JDBC_URL}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8087:8080"
    volumes:
      - ./keycloak-themes:/opt/keycloak/themes:ro
    depends_on:
      - postgres_iam
    networks:
      - app-network

  # 3. Microservicio de Autenticación (NestJS)
  ms_auth:
    image: gpaulucci/ms_auth:latest
    container_name: ms_auth_backend
    platform: linux/amd64
    environment:
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=banco-macro
      - KEYCLOAK_CLIENT_ID=ms-auth-backend
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - CALLBACK_URL=http://localhost:3000/auth/callback
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_iam:5432/db
    ports:
      - "3017:3000"
    depends_on:
      - keycloak
    networks:
      - app-network

  # 4. Frontend
  ms_frontend:
    image: gpaulucci/ms_frontend:latest
    container_name: ms_frontend
    platform: linux/amd64
    ports:
      - "80:80"
    depends_on:
      - ms_auth  # <--- Ahora coincide exactamente con el nombre del servicio arriba
    networks:
      - app-network
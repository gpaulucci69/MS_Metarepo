name: CI/CD Docker Hub Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Usamos versiones específicas que GitHub puede resolver sin ambigüedad
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push MS_Auth (Tu API NestJS)
      - name: Build and push MS_Auth
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Auth
          file: ./MS_Auth/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_api:latest

      # Build & Push MS_Frontend
      - name: Build and push MS_Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Frontend
          file: ./MS_Frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_frontend:latest

      # Build & Push MS_Keycloak
      - name: Build and push MS_Keycloak
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Keycloak
          file: ./MS_Keycloak/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_keycloak:latest
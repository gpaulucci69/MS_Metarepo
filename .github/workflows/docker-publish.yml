name: CI/CD Docker Hub Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build & Push MS_Auth (Tu API NestJS)
      - name: Build and push MS_Auth
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Auth
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_api:latest

      # 2. Build & Push MS_Frontend (Nginx + React)
      - name: Build and push MS_Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_frontend:latest

      # 3. Build & Push MS_Keycloak (Custom Theme)
      - name: Build and push MS_Keycloak
        uses: docker/build-push-action@v5
        with:
          context: ./MS_Keycloak
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ms_keycloak:latest